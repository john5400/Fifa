<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FIFA World Cup 2026 - Fixture Oficial</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    @media (max-width: 640px) {
      .score-input { width: 55px !important; font-size: 1rem !important; }
      .group-table th, .group-table td { font-size: 0.7rem; padding: 0.25rem 0.1rem; }
      .group-card .text-2xl { font-size: 1.3rem; }
    }
    .match-card { transition: all 0.2s ease; }
    .match-card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .score-input {
      width: 70px;
      text-align: center;
      font-weight: 700;
      font-size: 1.2rem;
      border-radius: 1rem;
      border: 2px solid #e2e8f0;
      padding: 0.3rem;
      transition: all 0.2s;
      background-color: white;
    }
    .score-input:focus {
      border-color: #f59e0b;
      outline: none;
      box-shadow: 0 0 0 3px rgba(245,158,11,0.2);
    }
    /* Feedback temporal al cambiar marcador */
    .score-changed {
      background-color: #bbf7d0 !important;
      border-color: #22c55e !important;
      transition: 0.1s;
    }
    /* Colores en tabla de grupos */
    .group-table tr.first-second td:not(:first-child) {
      background-color: #bbf7d0 !important;  /* verde claro */
    }
    .group-table tr.third td:not(:first-child) {
      background-color: #fef08a !important;  /* amarillo */
    }
    .group-table tr.fourth td:not(:first-child) {
      background-color: #fecaca !important;  /* rojo claro */
    }
    .group-table tr td:first-child {
      background-color: white !important;
    }
    /* Círculo de color para indicar clasificación en los partidos */
    .pos-indicator {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      margin-right: 6px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    /* Animación emoji */
    .emoji-floating {
      position: absolute;
      font-size: 1.2rem;
      pointer-events: none;
      animation: fadeUp 0.8s forwards;
      z-index: 100;
      font-weight: bold;
    }
    @keyframes fadeUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-25px); }
    }
    .group-table th, .group-table td { padding: 0.5rem 0.25rem; text-align: center; }
    .group-table th:first-child, .group-table td:first-child { text-align: left; }
    .bracket-card { transition: all 0.2s; background: white; border-radius: 1rem; }
    .bracket-card:hover { background-color: #fef9c3; }
    .group-card { transition: transform 0.2s, box-shadow 0.2s; }
    .group-card:hover { transform: translateY(-4px); box-shadow: 0 25px 30px -12px rgba(0,0,0,0.25); }
    .toast-notify { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 20px; border-radius: 50px; font-weight: bold; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  </style>
</head>
<body class="bg-gray-50 font-sans">

<div class="max-w-7xl mx-auto px-4 py-6">
  <div class="text-center mb-8">
    <h1 class="text-4xl sm:text-5xl font-bold text-emerald-700 flex items-center justify-center gap-4 flex-wrap">
      <span>FIFA WORLD CUP 2026</span>
      <i class="fa-solid fa-trophy text-yellow-500"></i>
    </h1>
    <p class="text-gray-600 mt-2 text-lg sm:text-xl">12 grupos · 48 selecciones · Fixture oficial (hora Argentina)</p>
    <p class="text-sm text-gray-500 mt-1">Datos guardados automáticamente · Partidos según imagen oficial</p>
    <div class="mt-4 flex flex-wrap justify-center gap-3">
      <button id="randomResultsBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-xl font-semibold shadow-md transition-all text-sm sm:text-base">
        <i class="fa-solid fa-dice"></i> Simular aleatorios
      </button>
      <button id="resetBtn" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl font-semibold shadow-md transition-all text-sm sm:text-base">
        <i class="fa-solid fa-rotate"></i> Reiniciar todo
      </button>
      <button id="clearStorageBtn" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-xl font-semibold shadow-md transition-all text-sm sm:text-base">
        <i class="fa-solid fa-database"></i> Limpiar datos guardados
      </button>
    </div>
  </div>

  <h2 class="text-3xl font-bold text-center mb-8 text-emerald-700">📋 Fase de Grupos</h2>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8" id="groups-container"></div>

  <hr class="my-12 border-gray-300">

  <h2 class="text-3xl font-bold text-center mb-8 text-emerald-700">🏆 Fase Final</h2>
  <div class="overflow-x-auto pb-4">
    <div class="flex gap-6 min-w-[1200px] lg:min-w-[1400px]">
      <div class="w-72 lg:w-80"><h3 class="text-center font-bold mb-4 bg-blue-100 py-2 rounded-xl">🔹 16avos de Final</h3><div class="space-y-4" id="ronda32"></div></div>
      <div class="w-72 lg:w-80"><h3 class="text-center font-bold mb-4 bg-emerald-100 py-2 rounded-xl">⚽ Octavos</h3><div class="space-y-4" id="octavos"></div></div>
      <div class="w-72 lg:w-80"><h3 class="text-center font-bold mb-4 bg-yellow-100 py-2 rounded-xl">🏅 Cuartos</h3><div class="space-y-4" id="cuartos"></div></div>
      <div class="w-72 lg:w-80"><h3 class="text-center font-bold mb-4 bg-orange-100 py-2 rounded-xl">🌟 Semifinales</h3><div class="space-y-4" id="semis"></div></div>
      <div class="w-72 lg:w-80"><h3 class="text-center font-bold mb-4 bg-red-200 py-2 rounded-xl">🏆 FINAL</h3><div id="final-container"></div></div>
    </div>
  </div>
</div>
<div id="toast" class="toast-notify">✅ Actualizado</div>

<script>
  // --------------------------------------------------------------
  // DATOS OFICIALES (todos los grupos completos)
  // --------------------------------------------------------------
  const groupsData = {
    A: { teams: ["MEXICO", "SOUTH KOREA", "CZECH REPUBLIC", "SOUTH AFRICA"], 
        matches: [["11 Jun 16:00","MEXICO","SOUTH AFRICA"],["11 Jun 23:00","SOUTH KOREA","CZECH REPUBLIC"],["18 Jun 13:00","CZECH REPUBLIC","SOUTH AFRICA"],["18 Jun 22:00","MEXICO","SOUTH KOREA"],["24 Jun","CZECH REPUBLIC","MEXICO"],["24 Jun","SOUTH AFRICA","SOUTH KOREA"]],
        color: "from-red-600 to-red-400" },
    B: { teams: ["CANADA", "SWITZERLAND", "QATAR", "BOSNIA"], 
        matches: [["12 Jun 16:00","CANADA","BOSNIA"],["13 Jun 16:00","QATAR","SWITZERLAND"],["18 Jun 16:00","SWITZERLAND","BOSNIA"],["18 Jun 19:00","CANADA","QATAR"],["24 Jun","SWITZERLAND","QATAR"],["24 Jun","BOSNIA","CANADA"]],
        color: "from-blue-700 to-blue-500" },
    C: { teams: ["BRAZIL", "MOROCCO", "SCOTLAND", "HAITI"], 
        matches: [["13 Jun 19:00","BRAZIL","MOROCCO"],["13 Jun 22:00","HAITI","SCOTLAND"],["19 Jun 19:00","SCOTLAND","MOROCCO"],["19 Jun 21:30","BRAZIL","HAITI"],["25 Jun","MOROCCO","HAITI"],["25 Jun","BRAZIL","SCOTLAND"]],
        color: "from-green-600 to-green-400" },
    D: { teams: ["USA", "AUSTRALIA", "PARAGUAY", "TURKIYE"], 
        matches: [["12 Jun 22:00","USA","PARAGUAY"],["14 Jun 01:00","AUSTRALIA","TURKIYE"],["19 Jun 16:00","USA","AUSTRALIA"],["20 Jun 00:00","TURKIYE","PARAGUAY"],["25 Jun","TURKIYE","USA"],["25 Jun","AUSTRALIA","PARAGUAY"]],
        color: "from-indigo-600 to-indigo-400" },
    E: { teams: ["GERMANY", "ECUADOR", "IVORY COAST", "CURACAO"], 
        matches: [["14 Jun 14:00","GERMANY","CURACAO"],["14 Jun 20:00","IVORY COAST","ECUADOR"],["20 Jun 17:00","GERMANY","IVORY COAST"],["20 Jun 23:00","ECUADOR","CURACAO"],["25 Jun","CURACAO","IVORY COAST"],["25 Jun","ECUADOR","GERMANY"]],
        color: "from-amber-600 to-amber-400" },
    F: { teams: ["NETHERLANDS", "JAPAN", "TUNISIA", "SWEDEN"], 
        matches: [["14 Jun 17:00","NETHERLANDS","JAPAN"],["14 Jun 23:00","SWEDEN","TUNISIA"],["20 Jun 14:00","NETHERLANDS","SWEDEN"],["21 Jun 01:00","TUNISIA","JAPAN"],["26 Jun","JAPAN","SWEDEN"],["26 Jun","TUNISIA","NETHERLANDS"]],
        color: "from-orange-600 to-orange-400" },
    G: { teams: ["BELGIUM", "IRAN", "EGYPT", "NEW ZEALAND"], 
        matches: [["15 Jun 16:00","BELGIUM","EGYPT"],["15 Jun 22:00","IRAN","NEW ZEALAND"],["21 Jun 16:00","BELGIUM","IRAN"],["21 Jun 22:00","NEW ZEALAND","EGYPT"],["26 Jun","IRAN","EGYPT"],["26 Jun","NEW ZEALAND","BELGIUM"]],
        color: "from-purple-600 to-purple-400" },
    H: { teams: ["SPAIN", "URUGUAY", "SAUDI ARABIA", "CAPE VERDE"], 
        matches: [["15 Jun 13:00","SPAIN","CAPE VERDE"],["15 Jun 19:00","SAUDI ARABIA","URUGUAY"],["21 Jun 13:00","SPAIN","SAUDI ARABIA"],["21 Jun 19:00","URUGUAY","CAPE VERDE"],["27 Jun","CAPE VERDE","SAUDI ARABIA"],["27 Jun","URUGUAY","SPAIN"]],
        color: "from-pink-600 to-pink-400" },
    I: { teams: ["FRANCE", "SENEGAL", "NORWAY", "IRAQ"], 
        matches: [["16 Jun 16:00","FRANCE","SENEGAL"],["16 Jun 19:00","IRAQ","NORWAY"],["22 Jun 18:00","FRANCE","IRAQ"],["22 Jun 21:00","NORWAY","SENEGAL"],["27 Jun","SENEGAL","IRAQ"],["27 Jun","NORWAY","FRANCE"]],
        color: "from-cyan-600 to-cyan-400" },
    J: { teams: ["ARGENTINA", "AUSTRIA", "ALGERIA", "JORDAN"], 
        matches: [["16 Jun 22:00","ARGENTINA","ALGERIA"],["17 Jun 01:00","AUSTRIA","JORDAN"],["22 Jun 14:00","ARGENTINA","AUSTRIA"],["23 Jun 00:00","JORDAN","ALGERIA"],["28 Jun","AUSTRIA","ALGERIA"],["28 Jun","JORDAN","ARGENTINA"]],
        color: "from-sky-600 to-sky-400" },
    K: { teams: ["PORTUGAL", "COLOMBIA", "UZBEKISTAN", "DR CONGO"], 
        matches: [["17 Jun 14:00","PORTUGAL","DR CONGO"],["17 Jun 23:00","UZBEKISTAN","COLOMBIA"],["23 Jun 14:00","PORTUGAL","UZBEKISTAN"],["23 Jun 23:00","COLOMBIA","DR CONGO"],["28 Jun","DR CONGO","UZBEKISTAN"],["28 Jun","COLOMBIA","PORTUGAL"]],
        color: "from-lime-600 to-lime-400" },
    L: { teams: ["ENGLAND", "CROATIA", "GHANA", "PANAMA"], 
        matches: [["17 Jun 17:00","ENGLAND","CROATIA"],["17 Jun 20:00","GHANA","PANAMA"],["23 Jun 17:00","ENGLAND","GHANA"],["23 Jun 20:00","PANAMA","CROATIA"],["29 Jun","CROATIA","GHANA"],["29 Jun","PANAMA","ENGLAND"]],
        color: "from-fuchsia-600 to-fuchsia-400" }
  };

  const flagMap = {
    "MEXICO":"🇲🇽","SOUTH KOREA":"🇰🇷","CZECH REPUBLIC":"🇨🇿","SOUTH AFRICA":"🇿🇦",
    "CANADA":"🇨🇦","SWITZERLAND":"🇨🇭","QATAR":"🇶🇦","BOSNIA":"🇧🇦",
    "BRAZIL":"🇧🇷","MOROCCO":"🇲🇦","SCOTLAND":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","HAITI":"🇭🇹",
    "USA":"🇺🇸","AUSTRALIA":"🇦🇺","PARAGUAY":"🇵🇾","TURKIYE":"🇹🇷",
    "GERMANY":"🇩🇪","ECUADOR":"🇪🇨","IVORY COAST":"🇨🇮","CURACAO":"🇨🇼",
    "NETHERLANDS":"🇳🇱","JAPAN":"🇯🇵","TUNISIA":"🇹🇳","SWEDEN":"🇸🇪",
    "BELGIUM":"🇧🇪","IRAN":"🇮🇷","EGYPT":"🇪🇬","NEW ZEALAND":"🇳🇿",
    "SPAIN":"🇪🇸","URUGUAY":"🇺🇾","SAUDI ARABIA":"🇸🇦","CAPE VERDE":"🇨🇻",
    "FRANCE":"🇫🇷","SENEGAL":"🇸🇳","NORWAY":"🇳🇴","IRAQ":"🇮🇶",
    "ARGENTINA":"🇦🇷","AUSTRIA":"🇦🇹","ALGERIA":"🇩🇿","JORDAN":"🇯🇴",
    "PORTUGAL":"🇵🇹","COLOMBIA":"🇨🇴","UZBEKISTAN":"🇺🇿","DR CONGO":"🇨🇩",
    "ENGLAND":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","CROATIA":"🇭🇷","GHANA":"🇬🇭","PANAMA":"🇵🇦"
  };
  function getFlag(code) { return flagMap[code] || "🏴"; }

  // -------------------- PERSISTENCIA --------------------
  const STORAGE_KEY = "FIFA2026_Complete_V5";
  let matchResults = {};
  let bracketResults = {
    r32_g1: {}, r32_g2: {}, r32_t1: {}, r32_t2: {},
    oct_g1: {}, oct_g2: {}, oct_t1: {}, oct_t2: {},
    cuart_g1: {}, cuart_g2: {}, cuart_t1: {}, cuart_t2: {},
    semis_g1: {}, semis_g2: {}, semis_t1: {}, semis_t2: {},
    final_g1: 0, final_g2: 0, final_t1: "---", final_t2: "---"
  };

  function saveToLocalStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ matchResults, bracketResults }));
  }

  function loadFromLocalStorage() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const p = JSON.parse(saved);
        if (p.matchResults) matchResults = p.matchResults;
        if (p.bracketResults) bracketResults = p.bracketResults;
      } catch(e) {}
    }
    for (let g in groupsData) {
      groupsData[g].matches.forEach((_, idx) => {
        const key = `${g}_${idx}`;
        if (matchResults[key] === undefined) matchResults[key] = { g1: 0, g2: 0 };
      });
    }
  }

  // -------------------- CÁLCULO DE TABLA --------------------
  function calculateStandings(groupLetter, teams, matchesList) {
    let stats = {};
    teams.forEach(t => stats[t] = { pj:0, g:0, e:0, p:0, gf:0, gc:0, pts:0 });
    matchesList.forEach((match, idx) => {
      const res = matchResults[`${groupLetter}_${idx}`];
      if (!res) return;
      const team1 = match[1];
      const team2 = match[2];
      let g1 = parseInt(res.g1) || 0;
      let g2 = parseInt(res.g2) || 0;
      if (g1 === 0 && g2 === 0) return;
      if (g1 === g2) {
        stats[team1].pj++; stats[team2].pj++;
        stats[team1].e++; stats[team2].e++;
        stats[team1].gf += g1; stats[team2].gf += g2;
        stats[team1].gc += g2; stats[team2].gc += g1;
        stats[team1].pts++; stats[team2].pts++;
      } else if (g1 > g2) {
        stats[team1].pj++; stats[team2].pj++;
        stats[team1].g++; stats[team2].p++;
        stats[team1].gf += g1; stats[team2].gf += g2;
        stats[team1].gc += g2; stats[team2].gc += g1;
        stats[team1].pts += 3;
      } else {
        stats[team1].pj++; stats[team2].pj++;
        stats[team1].p++; stats[team2].g++;
        stats[team1].gf += g1; stats[team2].gf += g2;
        stats[team1].gc += g2; stats[team2].gc += g1;
        stats[team2].pts += 3;
      }
    });
    const sorted = [...teams].sort((a,b) => {
      if (stats[a].pts !== stats[b].pts) return stats[b].pts - stats[a].pts;
      let difA = stats[a].gf - stats[a].gc, difB = stats[b].gf - stats[b].gc;
      if (difA !== difB) return difB - difA;
      return stats[b].gf - stats[a].gf;
    });
    return { stats, sorted };
  }

  // Devuelve el color según la posición del equipo en el grupo
  function getTeamPositionColor(teamName, sortedTeams) {
    const pos = sortedTeams.indexOf(teamName);
    if (pos === -1) return "gray";
    if (pos === 0 || pos === 1) return "#22c55e";  // verde
    if (pos === 2) return "#eab308";               // amarillo
    return "#ef4444";                              // rojo
  }

  // -------------------- RENDER DE GRUPOS (con color en partidos y tabla) --------------------
  function renderGroup(groupLetter, data) {
    const { teams, matches, color } = data;
    const { stats, sorted } = calculateStandings(groupLetter, teams, matches);
    let html = `<div class="group-card bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-200">
      <div class="bg-gradient-to-r ${color} text-white px-5 py-4 flex justify-between">
        <span class="text-2xl font-bold">Grupo ${groupLetter}</span>
        <i class="fa-solid fa-futbol text-2xl"></i>
      </div>
      <div class="p-5">
        <div class="overflow-x-auto">
          <table class="group-table w-full mb-6 text-sm">
            <thead><tr class="bg-gray-100"><th class="py-2 px-2 text-left">Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th>Pts</th> </tr></thead>
            <tbody>`;
    sorted.forEach((team, idx) => {
      const s = stats[team];
      let rowClass = '';
      if (idx === 0 || idx === 1) rowClass = 'first-second';
      else if (idx === 2) rowClass = 'third';
      else if (idx === 3) rowClass = 'fourth';
      html += `<tr class="${rowClass}">
        <td class="py-2 px-2 flex items-center gap-3"><span class="text-2xl">${getFlag(team)}</span> <span class="font-bold">${team}</span> </td>
        <td>${s.pj}</td><td>${s.g}</td><td>${s.e}</td><td>${s.p}</td>
        <td>${s.gf}</td><td>${s.gc}</td>
        <td class="font-bold bg-gray-50 text-emerald-700">${s.pts}</td>
      </tr>`;
    });
    html += `</tbody> </table> </div> <div class="space-y-3">`;
    matches.forEach((match, idx) => {
      const [fecha, t1, t2] = match;
      const res = matchResults[`${groupLetter}_${idx}`] || { g1:0, g2:0 };
      // Determinar colores de los círculos según la tabla actual (sorted)
      const color1 = getTeamPositionColor(t1, sorted);
      const color2 = getTeamPositionColor(t2, sorted);
      html += `<div class="match-card bg-gray-50 rounded-xl p-3 border">
        <div class="text-xs text-gray-500 text-center mb-1">${fecha}</div>
        <div class="flex items-center justify-between gap-2">
          <div class="flex items-center gap-2 flex-1">
            <span class="text-2xl">${getFlag(t1)}</span>
            <span class="pos-indicator" style="background-color: ${color1};"></span>
            <span class="text-sm font-semibold">${t1}</span>
          </div>
          <div class="flex items-center gap-2 relative">
            <input type="number" value="${res.g1}" data-group="${groupLetter}" data-match="${idx}" data-team="1" class="score-input match-score" min="0" style="width:70px">
            <span class="text-xl font-bold text-gray-400">-</span>
            <input type="number" value="${res.g2}" data-group="${groupLetter}" data-match="${idx}" data-team="2" class="score-input match-score" min="0" style="width:70px">
          </div>
          <div class="flex items-center gap-2 flex-1 justify-end">
            <span class="text-sm font-semibold">${t2}</span>
            <span class="pos-indicator" style="background-color: ${color2};"></span>
            <span class="text-2xl">${getFlag(t2)}</span>
          </div>
        </div>
      </div>`;
    });
    html += `</div></div></div>`;
    return html;
  }

  function renderAllGroups() {
    const container = document.getElementById('groups-container');
    container.innerHTML = '';
    for (let g in groupsData) container.innerHTML += renderGroup(g, groupsData[g]);
    document.querySelectorAll('.match-score').forEach(inp => {
      inp.removeEventListener('change', handleGroupScoreChange);
      inp.addEventListener('change', handleGroupScoreChange);
    });
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.opacity = '1';
    setTimeout(() => toast.style.opacity = '0', 2000);
  }

  // Efecto visual en inputs
  function animateScoreChange(inputElement) {
    if (!inputElement) return;
    inputElement.classList.add('score-changed');
    setTimeout(() => {
      inputElement.classList.remove('score-changed');
    }, 400);
    const rect = inputElement.getBoundingClientRect();
    const emojiDiv = document.createElement('div');
    emojiDiv.textContent = '⚽';
    emojiDiv.className = 'emoji-floating';
    emojiDiv.style.position = 'fixed';
    emojiDiv.style.left = `${rect.left + rect.width/2 - 10}px`;
    emojiDiv.style.top = `${rect.top - 20}px`;
    document.body.appendChild(emojiDiv);
    setTimeout(() => emojiDiv.remove(), 800);
  }

  function handleGroupScoreChange(e) {
    const inp = e.target;
    const group = inp.dataset.group, matchIdx = inp.dataset.match, team = inp.dataset.team;
    let val = parseInt(inp.value);
    if (isNaN(val)) val = 0;
    if (val < 0) val = 0;
    inp.value = val;
    const key = `${group}_${matchIdx}`;
    if (!matchResults[key]) matchResults[key] = { g1:0, g2:0 };
    if (team === '1') matchResults[key].g1 = val;
    else matchResults[key].g2 = val;
    renderAllGroups();
    updateBracketFromGroups();
    saveToLocalStorage();
    showToast(`📊 Grupo ${group} actualizado`);
    animateScoreChange(inp);
  }

  // -------------------- FASE FINAL --------------------
  function getQualifiers() {
    let qual = {};
    for (let g in groupsData) {
      const { teams, matches } = groupsData[g];
      const { sorted } = calculateStandings(g, teams, matches);
      qual[g] = { first: sorted[0], second: sorted[1] };
    }
    return qual;
  }

  function getBestThirdPlaced() {
    let thirdList = [];
    for (let g in groupsData) {
      const { teams, matches } = groupsData[g];
      const { stats, sorted } = calculateStandings(g, teams, matches);
      if (sorted.length >= 3) {
        const third = sorted[2];
        const s = stats[third];
        thirdList.push({ group: g, team: third, pts: s.pts, gf: s.gf, gc: s.gc });
      }
    }
    thirdList.sort((a,b) => {
      if (a.pts !== b.pts) return b.pts - a.pts;
      let difA = a.gf - a.gc, difB = b.gf - b.gc;
      if (difA !== difB) return difB - difA;
      return b.gf - a.gf;
    });
    return thirdList.slice(0,8).map(t => t.team);
  }

  function buildRound32() {
    const qual = getQualifiers();
    const bestThirds = getBestThirdPlaced();
    let allTeams = [];
    for (let g in qual) { allTeams.push(qual[g].first, qual[g].second); }
    allTeams.push(...bestThirds);
    while(allTeams.length < 32) allTeams.push("---");
    let html = '';
    for (let i = 0; i < 16; i++) {
      let team1 = bracketResults.r32_t1[i] !== undefined ? bracketResults.r32_t1[i] : (allTeams[i*2] || '---');
      let team2 = bracketResults.r32_t2[i] !== undefined ? bracketResults.r32_t2[i] : (allTeams[i*2+1] || '---');
      let g1 = bracketResults.r32_g1[i] !== undefined ? bracketResults.r32_g1[i] : 0;
      let g2 = bracketResults.r32_g2[i] !== undefined ? bracketResults.r32_g2[i] : 0;
      html += `<div class="bg-white p-3 rounded-2xl border shadow-sm bracket-card">
        <input type="text" id="r32_t1_${i}" value="${team1}" class="w-full text-center mb-2 font-bold border rounded-xl py-2 text-sm">
        <div class="flex justify-center items-center gap-3">
          <input type="number" id="r32_g1_${i}" value="${g1}" class="score-input border-2 w-16 text-lg" min="0">
          <span class="text-xl font-bold">-</span>
          <input type="number" id="r32_g2_${i}" value="${g2}" class="score-input border-2 w-16 text-lg" min="0">
        </div>
        <input type="text" id="r32_t2_${i}" value="${team2}" class="w-full text-center mt-2 font-bold border rounded-xl py-2 text-sm">
      </div>`;
    }
    document.getElementById('ronda32').innerHTML = html;
    for (let i = 0; i < 16; i++) {
      const g1El = document.getElementById(`r32_g1_${i}`);
      const g2El = document.getElementById(`r32_g2_${i}`);
      const t1El = document.getElementById(`r32_t1_${i}`);
      const t2El = document.getElementById(`r32_t2_${i}`);
      const update = () => {
        bracketResults.r32_g1[i] = parseInt(g1El.value) || 0;
        bracketResults.r32_g2[i] = parseInt(g2El.value) || 0;
        bracketResults.r32_t1[i] = t1El.value;
        bracketResults.r32_t2[i] = t2El.value;
        saveToLocalStorage();
        propagateFullBracket();
        if (g1El) animateScoreChange(g1El);
        if (g2El) animateScoreChange(g2El);
      };
      g1El.addEventListener('change', update);
      g2El.addEventListener('change', update);
      t1El.addEventListener('change', update);
      t2El.addEventListener('change', update);
    }
  }

  function buildFullBracket() {
    let octHtml = '', cuartHtml = '', semisHtml = '';
    for (let i = 0; i < 8; i++) {
      let t1 = bracketResults.oct_t1[i] || "---";
      let t2 = bracketResults.oct_t2[i] || "---";
      let g1 = bracketResults.oct_g1[i] || 0;
      let g2 = bracketResults.oct_g2[i] || 0;
      octHtml += `<div class="bg-white p-3 rounded-2xl border shadow-sm bracket-card">
        <input type="text" id="oct_t1_${i}" value="${t1}" class="w-full text-center mb-2 font-bold border rounded-xl py-2 text-sm bg-gray-50" readonly>
        <div class="flex justify-center items-center gap-3">
          <input type="number" id="oct_g1_${i}" value="${g1}" class="score-input border-2 w-16 text-lg" min="0">
          <span class="text-xl font-bold">-</span>
          <input type="number" id="oct_g2_${i}" value="${g2}" class="score-input border-2 w-16 text-lg" min="0">
        </div>
        <input type="text" id="oct_t2_${i}" value="${t2}" class="w-full text-center mt-2 font-bold border rounded-xl py-2 text-sm bg-gray-50" readonly>
      </div>`;
    }
    document.getElementById('octavos').innerHTML = octHtml;
    for (let i = 0; i < 4; i++) {
      let t1 = bracketResults.cuart_t1[i] || "---";
      let t2 = bracketResults.cuart_t2[i] || "---";
      let g1 = bracketResults.cuart_g1[i] || 0;
      let g2 = bracketResults.cuart_g2[i] || 0;
      cuartHtml += `<div class="bg-white p-3 rounded-2xl border shadow-sm bracket-card">
        <input type="text" id="cuart_t1_${i}" value="${t1}" class="w-full text-center mb-2 font-bold border rounded-xl py-2 text-sm bg-gray-50" readonly>
        <div class="flex justify-center items-center gap-3">
          <input type="number" id="cuart_g1_${i}" value="${g1}" class="score-input border-2 w-16 text-lg" min="0">
          <span class="text-xl font-bold">-</span>
          <input type="number" id="cuart_g2_${i}" value="${g2}" class="score-input border-2 w-16 text-lg" min="0">
        </div>
        <input type="text" id="cuart_t2_${i}" value="${t2}" class="w-full text-center mt-2 font-bold border rounded-xl py-2 text-sm bg-gray-50" readonly>
      </div>`;
    }
    document.getElementById('cuartos').innerHTML = cuartHtml;
    for (let i = 0; i < 2; i++) {
      let t1 = bracketResults.semis_t1[i] || "---";
      let t2 = bracketResults.semis_t2[i] || "---";
      let g1 = bracketResults.semis_g1[i] || 0;
      let g2 = bracketResults.semis_g2[i] || 0;
      semisHtml += `<div class="bg-white p-3 rounded-2xl border shadow-sm bracket-card">
        <input type="text" id="semis_t1_${i}" value="${t1}" class="w-full text-center mb-2 font-bold border rounded-xl py-2 text-sm bg-gray-50" readonly>
        <div class="flex justify-center items-center gap-3">
          <input type="number" id="semis_g1_${i}" value="${g1}" class="score-input border-2 w-16 text-lg" min="0">
          <span class="text-xl font-bold">-</span>
          <input type="number" id="semis_g2_${i}" value="${g2}" class="score-input border-2 w-16 text-lg" min="0">
        </div>
        <input type="text" id="semis_t2_${i}" value="${t2}" class="w-full text-center mt-2 font-bold border rounded-xl py-2 text-sm bg-gray-50" readonly>
      </div>`;
    }
    document.getElementById('semis').innerHTML = semisHtml;
    document.getElementById('final-container').innerHTML = `<div class="bg-white border-4 border-yellow-400 rounded-3xl p-6 shadow-2xl">
      <div class="text-center text-yellow-700 font-bold mb-4">FINAL - 19 Julio - NY/NJ</div>
      <div class="flex flex-col gap-4">
        <input type="text" id="final_t1" value="${bracketResults.final_t1}" class="w-full text-center font-bold py-2 border-2 rounded-xl bg-gray-50" readonly>
        <div class="flex items-center justify-center gap-4">
          <input type="number" id="final_g1" value="${bracketResults.final_g1}" class="score-input border-2 w-20 text-2xl" min="0">
          <span class="text-3xl font-bold">-</span>
          <input type="number" id="final_g2" value="${bracketResults.final_g2}" class="score-input border-2 w-20 text-2xl" min="0">
        </div>
        <input type="text" id="final_t2" value="${bracketResults.final_t2}" class="w-full text-center font-bold py-2 border-2 rounded-xl bg-gray-50" readonly>
      </div>
    </div>`;

    for (let i = 0; i < 8; i++) {
      const g1 = document.getElementById(`oct_g1_${i}`);
      const g2 = document.getElementById(`oct_g2_${i}`);
      const updateOct = () => {
        bracketResults.oct_g1[i] = parseInt(g1.value) || 0;
        bracketResults.oct_g2[i] = parseInt(g2.value) || 0;
        saveToLocalStorage();
        propagateFullBracket();
        if (g1) animateScoreChange(g1);
        if (g2) animateScoreChange(g2);
      };
      if (g1 && g2) { g1.addEventListener('change', updateOct); g2.addEventListener('change', updateOct); }
    }
    for (let i = 0; i < 4; i++) {
      const g1 = document.getElementById(`cuart_g1_${i}`);
      const g2 = document.getElementById(`cuart_g2_${i}`);
      const updateCuart = () => {
        bracketResults.cuart_g1[i] = parseInt(g1.value) || 0;
        bracketResults.cuart_g2[i] = parseInt(g2.value) || 0;
        saveToLocalStorage();
        propagateFullBracket();
        if (g1) animateScoreChange(g1);
        if (g2) animateScoreChange(g2);
      };
      if (g1 && g2) { g1.addEventListener('change', updateCuart); g2.addEventListener('change', updateCuart); }
    }
    for (let i = 0; i < 2; i++) {
      const g1 = document.getElementById(`semis_g1_${i}`);
      const g2 = document.getElementById(`semis_g2_${i}`);
      const updateSemis = () => {
        bracketResults.semis_g1[i] = parseInt(g1.value) || 0;
        bracketResults.semis_g2[i] = parseInt(g2.value) || 0;
        saveToLocalStorage();
        propagateFullBracket();
        if (g1) animateScoreChange(g1);
        if (g2) animateScoreChange(g2);
      };
      if (g1 && g2) { g1.addEventListener('change', updateSemis); g2.addEventListener('change', updateSemis); }
    }
    const finalG1 = document.getElementById('final_g1');
    const finalG2 = document.getElementById('final_g2');
    if (finalG1 && finalG2) {
      const updateFinal = () => {
        bracketResults.final_g1 = parseInt(finalG1.value) || 0;
        bracketResults.final_g2 = parseInt(finalG2.value) || 0;
        saveToLocalStorage();
        if (finalG1) animateScoreChange(finalG1);
        if (finalG2) animateScoreChange(finalG2);
      };
      finalG1.addEventListener('change', updateFinal);
      finalG2.addEventListener('change', updateFinal);
    }
  }

  function propagateFullBracket() {
    for (let i = 0; i < 16; i++) {
      const g1 = bracketResults.r32_g1[i] || 0;
      const g2 = bracketResults.r32_g2[i] || 0;
      let winner = null;
      if (g1 > g2) winner = bracketResults.r32_t1[i];
      else if (g2 > g1) winner = bracketResults.r32_t2[i];
      if (winner && winner !== '---') {
        const octIdx = Math.floor(i / 2);
        const isFirst = (i % 2 === 0);
        if (isFirst) {
          bracketResults.oct_t1[octIdx] = winner;
          const el = document.getElementById(`oct_t1_${octIdx}`);
          if (el) el.value = winner;
        } else {
          bracketResults.oct_t2[octIdx] = winner;
          const el = document.getElementById(`oct_t2_${octIdx}`);
          if (el) el.value = winner;
        }
      }
    }
    for (let i = 0; i < 8; i++) {
      const g1 = bracketResults.oct_g1[i] || 0;
      const g2 = bracketResults.oct_g2[i] || 0;
      let winner = null;
      if (g1 > g2) winner = bracketResults.oct_t1[i];
      else if (g2 > g1) winner = bracketResults.oct_t2[i];
      if (winner && winner !== '---') {
        const qfIdx = Math.floor(i / 2);
        const isFirst = (i % 2 === 0);
        if (isFirst) {
          bracketResults.cuart_t1[qfIdx] = winner;
          const el = document.getElementById(`cuart_t1_${qfIdx}`);
          if (el) el.value = winner;
        } else {
          bracketResults.cuart_t2[qfIdx] = winner;
          const el = document.getElementById(`cuart_t2_${qfIdx}`);
          if (el) el.value = winner;
        }
      }
    }
    for (let i = 0; i < 4; i++) {
      const g1 = bracketResults.cuart_g1[i] || 0;
      const g2 = bracketResults.cuart_g2[i] || 0;
      let winner = null;
      if (g1 > g2) winner = bracketResults.cuart_t1[i];
      else if (g2 > g1) winner = bracketResults.cuart_t2[i];
      if (winner && winner !== '---') {
        const sfIdx = Math.floor(i / 2);
        const isFirst = (i % 2 === 0);
        if (isFirst) {
          bracketResults.semis_t1[sfIdx] = winner;
          const el = document.getElementById(`semis_t1_${sfIdx}`);
          if (el) el.value = winner;
        } else {
          bracketResults.semis_t2[sfIdx] = winner;
          const el = document.getElementById(`semis_t2_${sfIdx}`);
          if (el) el.value = winner;
        }
      }
    }
    for (let i = 0; i < 2; i++) {
      const g1 = bracketResults.semis_g1[i] || 0;
      const g2 = bracketResults.semis_g2[i] || 0;
      let winner = null;
      if (g1 > g2) winner = bracketResults.semis_t1[i];
      else if (g2 > g1) winner = bracketResults.semis_t2[i];
      if (winner && winner !== '---') {
        if (i === 0) {
          bracketResults.final_t1 = winner;
          const el = document.getElementById('final_t1');
          if (el) el.value = winner;
        } else {
          bracketResults.final_t2 = winner;
          const el = document.getElementById('final_t2');
          if (el) el.value = winner;
        }
      }
    }
    saveToLocalStorage();
  }

  function updateBracketFromGroups() {
    buildRound32();
    propagateFullBracket();
  }

  function randomizeAllGroupResults() {
    for (let g in groupsData) {
      groupsData[g].matches.forEach((_, idx) => {
        const g1 = Math.floor(Math.random() * 5);
        const g2 = Math.floor(Math.random() * 5);
        matchResults[`${g}_${idx}`] = { g1, g2 };
      });
    }
    renderAllGroups();
    updateBracketFromGroups();
    saveToLocalStorage();
    showToast("🎲 ¡Resultados aleatorios generados!");
  }

  function resetAllData() {
    if (!confirm('¿Reiniciar todos los resultados? Se perderán los datos.')) return;
    for (let g in groupsData) {
      groupsData[g].matches.forEach((_, idx) => {
        matchResults[`${g}_${idx}`] = { g1: 0, g2: 0 };
      });
    }
    bracketResults = {
      r32_g1: {}, r32_g2: {}, r32_t1: {}, r32_t2: {},
      oct_g1: {}, oct_g2: {}, oct_t1: {}, oct_t2: {},
      cuart_g1: {}, cuart_g2: {}, cuart_t1: {}, cuart_t2: {},
      semis_g1: {}, semis_g2: {}, semis_t1: {}, semis_t2: {},
      final_g1: 0, final_g2: 0, final_t1: "---", final_t2: "---"
    };
    renderAllGroups();
    buildFullBracket();
    buildRound32();
    propagateFullBracket();
    saveToLocalStorage();
    showToast("🔄 Todo reiniciado.");
  }

  function clearStorage() {
    if (confirm('¿Eliminar todos los datos guardados?')) {
      localStorage.removeItem(STORAGE_KEY);
      resetAllData();
      showToast("🗑️ Datos guardados eliminados.");
    }
  }

  window.onload = () => {
    loadFromLocalStorage();
    renderAllGroups();
    buildFullBracket();
    buildRound32();
    propagateFullBracket();
    document.getElementById('randomResultsBtn').addEventListener('click', randomizeAllGroupResults);
    document.getElementById('resetBtn').addEventListener('click', resetAllData);
    document.getElementById('clearStorageBtn').addEventListener('click', clearStorage);
  };
</script>
</body>
</html>
